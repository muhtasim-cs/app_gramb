<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit UI Lab</title>
    <meta
      name="description"
      content="UI/UX-first starter workspace for Figma + VS Code."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <div class="background-glow" aria-hidden="true"></div>

    <main class="stage">
      <section class="phone reveal" aria-label="Mobile app prototype">
        <header class="appbar">
          <div>
            <p class="eyebrow">Orbit Mobile</p>
            <h1>Good morning, Aisha</h1>
          </div>
          <button class="icon-btn" aria-label="Notifications">*</button>
        </header>

        <article class="balance-card card-block">
          <p class="label">Monthly Budget</p>
          <p class="amount">$2,460</p>
          <div
            class="progress-wrap"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="74"
          >
            <span class="progress-fill"></span>
          </div>
          <p class="hint">74% already planned this month</p>
        </article>

        <section class="quick-actions card-block">
          <button class="chip is-active">Transfer</button>
          <button class="chip">Top up</button>
          <button class="chip">Analytics</button>
        </section>

        <section class="feed">
          <article class="feed-card card-block">
            <p class="tag">Today</p>
            <h2>Design review call</h2>
            <p>Figma walkthrough at 3:30 PM with product team.</p>
          </article>
          <article class="feed-card card-block">
            <p class="tag tag-coral">Tomorrow</p>
            <h2>Prototype usability test</h2>
            <p>Validate mobile onboarding flow with 5 users.</p>
          </article>
        </section>

        <nav class="tabbar" aria-label="Main tabs">
          <button class="tab is-active" data-tab="home">Home</button>
          <button class="tab" data-tab="wallet">Wallet</button>
          <button class="tab" data-tab="stats">Stats</button>
          <button class="tab" data-tab="profile">Profile</button>
        </nav>
      </section>
    </main>

    <script src="./scripts/main.js"></script>
  </body>
</html>
